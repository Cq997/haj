<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة نطاق منى</title>

<style>
body {
  font-family: 'Tahoma', sans-serif;
  margin:0;
  background:#f5f7fb;
}

.sidebar {
  position: fixed;
  right:0;
  top:0;
  width:260px;
  height:100%;
  background:#0b1f3a;
  color:#fff;
  padding:20px;
}

.content {
  margin-right:280px;
  padding:20px;
}

.hidden {display:none;}

.card {
  background:#fff;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

input, select {
  width:100%;
  padding:6px;
}

button {
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="sidebar">
  <h2>منصة نطاق منى</h2>

  <button onclick="showPage('home')">الرئيسية</button>
  <button onclick="showPage('handover')">تسليم المناوبة</button>
  <button onclick="showPage('deployment')">خطة الانتشار</button>
</div>

<div class="content">

<div id="home">
  <h3>الرئيسية</h3>
</div>

<div id="handover" class="hidden">
  <h3>تسليم المناوبة</h3>
  <input placeholder="اسم كبير المسعفين">
</div>

<div id="deployment" class="hidden">
  <h3>خطة الانتشار</h3>

  <select id="deploy_sector" onchange="loadDeploymentTemplate()">
    <option value="">اختر القطاع</option>
    <option value="الجمرات">الجمرات</option>
    <option value="القطارات">القطارات</option>
  </select>

  <select id="deploy_shift">
    <option value="الصباحية">الصباحية</option>
    <option value="المسائية">المسائية</option>
  </select>

  <table border="1" width="100%">
    <thead>
      <tr>
        <th>الرمز</th>
        <th>النوع</th>
        <th>الوقت</th>
      </tr>
    </thead>
    <tbody id="deploymentTableBody"></tbody>
  </table>
</div>

</div>
<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxTQ2ndVTNau28U-iYW9NOEVfw_iZdt3OKqVs9ATzt9BnEuezMz-HYrm5pQPU1lCd06/exec';

function showPage(id){
  document.querySelectorAll('.content > div').forEach(d=>d.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

/* بيانات حقيقية (عدلها حسب ملفك) */
const deploymentMasterData = {
  "الجمرات": [
    {code:"VMH55", type:"مركبة"},
    {code:"VMH56", type:"مركبة"},
    {code:"MH57", type:"مركبة"}
  ],
  "القطارات": [
    {code:"TR01", type:"مركبة"},
    {code:"TR02", type:"مركبة"}
  ]
};

function loadDeploymentTemplate(){
  const sector = document.getElementById('deploy_sector').value;
  const shift = document.getElementById('deploy_shift').value;
  const body = document.getElementById('deploymentTableBody');

  body.innerHTML='';

  if(!sector) return;

  const items = deploymentMasterData[sector] || [];

  items.forEach(item=>{
    body.innerHTML += `
      <tr>
        <td>${item.code}</td>
        <td>${item.type}</td>
        <td>${shift}</td>
      </tr>
    `;
  });
}
</script>

</body>
</html>
